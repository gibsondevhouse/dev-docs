<!-- @dsCard group="Colors" viewport="700x150" name="Semantic / Feedback" subtitle="Color reserved for meaning: success, destructive, focus ring" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-size: var(--text-xs); font-weight: var(--weight-medium); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">success</div><div class="hex">#16a34a · Connected</div></div>
    <div class="sw"><div class="chip" style="background:var(--destructive)"></div><div class="name">destructive</div><div class="hex">#ef4444</div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="name">secondary</div><div class="hex">#f1f5f9</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">accent</div><div class="hex">#f1f5f9</div></div>
    <div class="sw"><div class="chip" style="background:#fff;box-shadow:var(--shadow-focus)"></div><div class="name">ring</div><div class="hex">#020817 · focus</div></div>
  </div>
</body>
</html>
