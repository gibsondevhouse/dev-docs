<!-- @dsCard group="Colors" viewport="700x120" name="Chart palette" subtitle="shadcn defaults — data viz only, never UI decoration" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 48px; border-radius: var(--radius-md); }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: 8px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--chart-1)"></div><div class="hex">chart-1</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-2)"></div><div class="hex">chart-2</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-3)"></div><div class="hex">chart-3</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-4)"></div><div class="hex">chart-4</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-5)"></div><div class="hex">chart-5</div></div>
  </div>
</body>
</html>
