<!-- @dsCard group="Colors" viewport="700x150" name="Core / Action" subtitle="Primary is near-black slate — quiet, not a bright brand hue" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-size: var(--text-xs); font-weight: var(--weight-medium); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="name">background</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--foreground)"></div><div class="name">foreground</div><div class="hex">#020817</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">primary</div><div class="hex">#0f172a</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">muted</div><div class="hex">#f1f5f9</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><div class="name">muted-fg</div><div class="hex">#64748b</div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">border</div><div class="hex">#e2e8f0</div></div>
  </div>
</body>
</html>
