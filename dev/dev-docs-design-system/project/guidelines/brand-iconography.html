<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 24px; }
  .row { display: flex; gap: 26px; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 9px; color: var(--slate-700); }
  .ic img { width: 24px; height: 24px; }
  .ic span { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); }
  .app { color: var(--primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="ic app"><img src="https://unpkg.com/lucide-static@latest/icons/message-square.svg" alt="" /><span>message-square</span></div>
    <div class="ic app"><img src="https://unpkg.com/lucide-static@latest/icons/folder-open.svg" alt="" /><span>folder-open</span></div>
    <div class="ic app"><img src="https://unpkg.com/lucide-static@latest/icons/settings.svg" alt="" /><span>settings</span></div>
    <div class="ic app"><img src="https://unpkg.com/lucide-static@latest/icons/send.svg" alt="" /><span>send</span></div>
    <div class="ic"><img src="https://unpkg.com/lucide-static@latest/icons/file-text.svg" alt="" /><span>file-text</span></div>
    <div class="ic"><img src="https://unpkg.com/lucide-static@latest/icons/git-branch.svg" alt="" /><span>git-branch</span></div>
    <div class="ic"><img src="https://unpkg.com/lucide-static@latest/icons/check.svg" alt="" /><span>check</span></div>
    <div class="ic"><img src="https://unpkg.com/lucide-static@latest/icons/chevron-right.svg" alt="" /><span>chevron-right</span></div>
    <div class="ic"><img src="https://unpkg.com/lucide-static@latest/icons/archive.svg" alt="" /><span>archive</span></div>
  </div>
</body>
</html>
