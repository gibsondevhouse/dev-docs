<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows" subtitle="Borders do the work — shadows are rare, soft & reserved for floats" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 26px; }
  .row { display: flex; gap: 26px; }
  .b { flex: 1; height: 64px; background: #fff; border-radius: var(--radius); border: 1px solid var(--border); }
  .lab { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: 12px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div style="flex:1"><div class="b" style="box-shadow:none">  </div><div class="lab">border only ★</div></div>
    <div style="flex:1"><div class="b" style="box-shadow:var(--shadow-xs);border-color:transparent"></div><div class="lab">shadow-xs</div></div>
    <div style="flex:1"><div class="b" style="box-shadow:var(--shadow-sm);border-color:transparent"></div><div class="lab">shadow-sm</div></div>
    <div style="flex:1"><div class="b" style="box-shadow:var(--shadow-md);border-color:transparent"></div><div class="lab">shadow-md · popover</div></div>
  </div>
</body>
</html>
