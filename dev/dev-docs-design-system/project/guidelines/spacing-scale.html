<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base · p-6 (24) screen padding · gap-2 (8) between controls" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 22px; }
  .r { display: flex; align-items: center; gap: 14px; padding: 3px 0; }
  .tok { width: 92px; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); }
  .bar { height: 14px; background: var(--primary); border-radius: 2px; }
</style>
</head>
<body>
  <div class="r"><span class="tok">space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="tok">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="tok">space-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="tok">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="tok">space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="tok">space-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="tok">space-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="tok">space-16 · 64</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
