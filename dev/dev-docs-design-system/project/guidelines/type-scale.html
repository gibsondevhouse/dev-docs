<!-- @dsCard group="Type" viewport="700x300" name="Scale" subtitle="Built around text-sm (14px) body · text-xs (12px) for logs & meta" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 22px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border-bottom: 0; }
  .tok { width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); }
  .spec { letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="r"><span class="tok">5xl · 48</span><span class="spec" style="font-size:var(--text-5xl);font-weight:600">Plan</span></div>
  <div class="r"><span class="tok">3xl · 30</span><span class="spec" style="font-size:var(--text-3xl);font-weight:600">Definition of Done</span></div>
  <div class="r"><span class="tok">2xl · 24</span><span class="spec" style="font-size:var(--text-2xl);font-weight:600">Active Plan Status</span></div>
  <div class="r"><span class="tok">xl · 20</span><span class="spec" style="font-size:var(--text-xl);font-weight:500">Repository Folder</span></div>
  <div class="r"><span class="tok">sm · 14 · body</span><span class="spec" style="font-size:var(--text-sm)">Start chatting to build a plan.</span></div>
  <div class="r"><span class="tok">xs · 12</span><span class="spec" style="font-size:var(--text-xs);font-family:var(--font-mono)">✓ Done · Indexing…</span></div>
</body>
</html>
