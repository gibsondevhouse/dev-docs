<!-- @dsCard group="Colors" viewport="700x150" name="Plan status" subtitle="The methodology's state language — Queued → Active → Complete · Deferred · Blocked" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: var(--weight-medium); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .legend { margin-top: 16px; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <span class="pill" style="background:var(--status-queued-soft);color:#3f4a5a"><span class="dot" style="background:var(--status-queued)"></span>Queued</span>
    <span class="pill" style="background:var(--status-active-soft);color:#1d4ed8"><span class="dot" style="background:var(--status-active)"></span>Active</span>
    <span class="pill" style="background:var(--status-complete-soft);color:#15803d"><span class="dot" style="background:var(--status-complete)"></span>Complete</span>
    <span class="pill" style="background:var(--status-deferred-soft);color:#92400e"><span class="dot" style="background:var(--status-deferred)"></span>Deferred</span>
    <span class="pill" style="background:var(--status-blocked-soft);color:#b91c1c"><span class="dot" style="background:var(--status-blocked)"></span>Blocked</span>
  </div>
  <div class="legend">--status-queued · --status-active · --status-complete · --status-deferred · --status-blocked</div>
</body>
</html>
