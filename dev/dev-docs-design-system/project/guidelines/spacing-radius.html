<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Uniform & modest — 8 cards · 6 controls · 4 chips · full pills" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 22px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .b { width: 90px; height: 64px; background: var(--secondary); border: 1px solid var(--border); }
  .lab { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="b" style="border-radius:var(--radius)"></div><div class="lab">radius · 8</div></div>
    <div><div class="b" style="border-radius:var(--radius-md)"></div><div class="lab">md · 6</div></div>
    <div><div class="b" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 4</div></div>
    <div><div class="b" style="border-radius:var(--radius-full);width:64px"></div><div class="lab">full · pill</div></div>
  </div>
</body>
</html>
