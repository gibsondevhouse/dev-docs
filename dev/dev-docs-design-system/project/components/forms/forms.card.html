<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Field, Input, Select, Textarea } = window.DevDocsDesignSystem_300643;
    function Demo() {
      return (
        <div className="grid">
          <Field label="OpenRouter API Key" hint="Stored in the macOS Keychain">
            <Input type="password" placeholder="sk-or-..." mono defaultValue="sk-or-v1-9f3a" />
          </Field>
          <Field label="Model">
            <Select defaultValue="deepseek-chat">
              <option>deepseek-chat</option>
              <option>deepseek-reasoner</option>
              <option>anthropic/claude-3.5</option>
            </Select>
          </Field>
          <Field label="Repository Folder" error="No folder selected">
            <Input invalid placeholder="/path/to/repo" mono />
          </Field>
          <Field label="Message">
            <Textarea placeholder="Type a message…" defaultValue="Add a connection test button to Settings" />
          </Field>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
