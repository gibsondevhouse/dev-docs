<!-- @dsCard group="Components" viewport="700x340" name="Buttons" subtitle="Button variants/sizes/states + IconButton grounds" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); padding: 22px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--muted-foreground); margin: 0 0 9px; }
  .rail { background: var(--rail-bg); padding: 8px; border-radius: var(--radius-md); display: inline-flex; gap: 6px; }
  .icw { width: 20px; height: 20px; display: block; }
  .icw.inv { filter: invert(1); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton } = window.DevDocsDesignSystem_300643;
    const Icon = ({ n, inv }) => <img className={"icw" + (inv ? " inv" : "")} src={`https://unpkg.com/lucide-static@latest/icons/${n}.svg`} alt="" />;

    function Demo() {
      return (
        <div>
          <p className="eyebrow">Variants</p>
          <div className="row">
            <Button variant="primary">Index Folder</Button>
            <Button variant="secondary">Browse</Button>
            <Button variant="ghost">Clear</Button>
            <Button variant="destructive">Delete</Button>
          </div>
          <p className="eyebrow">Sizes · states</p>
          <div className="row">
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <Button disabled>Disabled</Button>
            <Button loading>Indexing…</Button>
            <Button variant="secondary" startIcon={<Icon n="send" />}>Send</Button>
          </div>
          <p className="eyebrow">IconButton</p>
          <div className="row">
            <IconButton label="Send"><Icon n="send" /></IconButton>
            <IconButton variant="primary" label="Send"><Icon n="send" inv /></IconButton>
            <span className="rail">
              <IconButton variant="rail" active label="Chat"><Icon n="message-square" inv /></IconButton>
              <IconButton variant="rail" label="Repos"><Icon n="folder-open" inv /></IconButton>
              <IconButton variant="rail" label="Settings"><Icon n="settings" inv /></IconButton>
            </span>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
